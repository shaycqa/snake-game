<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sloth Launcher - Physics Game</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background-color: #87CEEB; /* Sky blue */
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        overflow: hidden;
    }
    h1 {
        margin: 10px 0 5px;
        color: #333;
        text-shadow: 1px 1px 2px rgba(255,255,255,0.7);
    }
    #game-container {
        position: relative;
    }
    canvas {
        background-color: #E0F6FF;
        border: 2px solid #333;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    #ui-container {
        margin-top: 15px;
        background: white;
        padding: 15px 30px;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        display: flex;
        flex-direction: column;
        gap: 15px;
        width: 340px;
    }
    .control-group {
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .control-group label {
        font-size: 24px;
        width: 40px;
        text-align: center;
    }
    input[type="range"] {
        flex-grow: 1;
        cursor: pointer;
    }
    button {
        padding: 12px;
        font-size: 18px;
        font-weight: bold;
        background-color: #FF5722;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s;
    }
    button:hover {
        background-color: #E64A19;
    }
    button:active {
        transform: scale(0.95);
    }
    button:disabled {
        background-color: #ccc;
        cursor: not-allowed;
        transform: none;
    }
    #hud {
        display: flex;
        justify-content: space-between;
        width: 400px;
        margin-top: 5px;
        font-size: 20px;
        font-weight: bold;
        color: #333;
        background: rgba(255, 255, 255, 0.7);
        padding: 5px 15px;
        border-radius: 20px;
        box-sizing: border-box;
    }
</style>
</head>
<body>

<h1>Sloth Launcher</h1>

<div id="hud">
    <div>Level: <span id="level">1</span></div>
    <div>Score: <span id="score">0</span></div>
</div>

<div id="game-container">
    <canvas id="gameCanvas" width="400" height="450"></canvas>
</div>

<div id="ui-container">
    <div class="control-group">
        <label title="Bomb Power">💣</label>
        <input type="range" id="powerSlider" min="1" max="10" value="5">
    </div>
    <div class="control-group">
        <label title="Direction (Left/Right)">↔️</label>
        <input type="range" id="directionSlider" min="-10" max="10" value="0">
    </div>
    <button id="launchBtn">LAUNCH SLOTH!</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Lazy AudioContext initialization (required by browsers)
    let audioCtx = null;
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    // Procedural Sound Generator
    function playSound(type) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        const now = audioCtx.currentTime;

        if (type === 'explosion') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(100, now);
            osc.frequency.exponentialRampToValueAtTime(10, now + 0.5);
            gainNode.gain.setValueAtTime(0.8, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            osc.start(now);
            osc.stop(now + 0.5);
        } else if (type === 'apple') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, now);
            osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
            gainNode.gain.setValueAtTime(0.4, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(now);
            osc.stop(now + 0.3);
        } else if (type === 'bounce') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(200, now);
            osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
            gainNode.gain.setValueAtTime(0.3, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now);
            osc.stop(now + 0.1);
        }
    }

    // Game state
    let state = 'idle'; // idle, flying, waiting
    let level = 1;
    let score = 0;
    let scoreAtLevelStart = 0;
    let apples = [];
    let particles = []; 
    let isDragging = false;

    const groundY = canvas.height - 15;
    
    const sloth = {
        x: canvas.width / 2,
        y: groundY - 20,
        vx: 0,
        vy: 0,
        radius: 20,
        rotation: 0,
        reset() {
            this.x = canvas.width / 2;
            this.y = groundY - 20;
            this.vx = 0;
            this.vy = 0;
            this.rotation = 0;
        }
    };

    const gravity = 0.25;
    const bounceFactor = -0.7;
    const friction = 0.8;

    // UI Elements
    const powerSlider = document.getElementById('powerSlider');
    const directionSlider = document.getElementById('directionSlider');
    const launchBtn = document.getElementById('launchBtn');
    const levelEl = document.getElementById('level');
    const scoreEl = document.getElementById('score');

    // Drag and Drop Logic
    canvas.addEventListener('mousedown', (e) => {
        if (state !== 'idle') return;
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;
        const dist = Math.hypot(sloth.x - mouseX, sloth.y - mouseY);
        if (dist < sloth.radius * 1.5) { 
            isDragging = true;
        }
    });

    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;
        
        if (state === 'idle') {
            const dist = Math.hypot(sloth.x - mouseX, sloth.y - mouseY);
            canvas.style.cursor = (dist < sloth.radius * 1.5 || isDragging) ? 'grab' : 'default';
        } else {
            canvas.style.cursor = 'default';
        }

        if (isDragging) {
            canvas.style.cursor = 'grabbing';
            sloth.x = Math.max(sloth.radius, Math.min(canvas.width - sloth.radius, mouseX));
        }
    });

    window.addEventListener('mouseup', () => {
        if (isDragging) {
            isDragging = false;
            canvas.style.cursor = 'grab';
        }
    });
    
    canvas.addEventListener('touchstart', (e) => {
        if (state !== 'idle') return;
        const rect = canvas.getBoundingClientRect();
        const touchX = e.touches[0].clientX - rect.left;
        const touchY = e.touches[0].clientY - rect.top;
        const dist = Math.hypot(sloth.x - touchX, sloth.y - touchY);
        if (dist < sloth.radius * 2) {
            isDragging = true;
            e.preventDefault();
        }
    }, {passive: false});

    canvas.addEventListener('touchmove', (e) => {
        if (isDragging) {
            const rect = canvas.getBoundingClientRect();
            const touchX = e.touches[0].clientX - rect.left;
            sloth.x = Math.max(sloth.radius, Math.min(canvas.width - sloth.radius, touchX));
            e.preventDefault();
        }
    }, {passive: false});

    window.addEventListener('touchend', () => {
        isDragging = false;
    });

    function createLevel() {
        scoreAtLevelStart = score;
        apples = [];
        const numApples = Math.min(2 + Math.floor(level / 2), 7); 
        
        for (let i = 0; i < numApples; i++) {
            const size = Math.max(10, 22 - (level * 0.8)); 
            
            let placed = false;
            let attempts = 0;
            while (!placed && attempts < 100) {
                const x = size + Math.random() * (canvas.width - 2 * size);
                const y = size + Math.random() * (canvas.height * 0.6); 
                
                let tooClose = false;
                for (let a of apples) {
                    const dist = Math.hypot(a.x - x, a.y - y);
                    if (dist < size + a.radius + 15) {
                        tooClose = true;
                        break;
                    }
                }
                if (!tooClose) {
                    apples.push({ x, y, radius: size, collected: false });
                    placed = true;
                }
                attempts++;
            }
        }
        sloth.reset();
        state = 'idle';
        levelEl.textContent = level;
        launchBtn.disabled = false;
        launchBtn.textContent = 'LAUNCH SLOTH!';
    }

    function createExplosion(x, y, power) {
        for (let i = 0; i < power * 6; i++) {
            particles.push({
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * power * 2.5,
                vy: (Math.random() - 0.5) * power * 2.5,
                life: 1.0,
                color: Math.random() > 0.4 ? '#FF5722' : (Math.random() > 0.5 ? '#FFC107' : '#D84315')
            });
        }
    }

    launchBtn.addEventListener('click', () => {
        initAudio();
        if (state !== 'idle') return;

        const power = parseInt(powerSlider.value);
        const direction = parseInt(directionSlider.value); 

        let forceY = -10 - (power * 1.6); 
        let forceX = -direction * 1.2; 

        sloth.vx = forceX;
        sloth.vy = forceY;
        
        const bombX = sloth.x + (direction * 2.5);
        const bombY = sloth.y + 15;

        createExplosion(bombX, bombY, power);
        playSound('explosion');

        state = 'flying';
        launchBtn.disabled = true;
        launchBtn.textContent = 'FLYING...';
    });

    function update() {
        if (state === 'flying') {
            sloth.vy += gravity;
            sloth.x += sloth.vx;
            sloth.y += sloth.vy;
            sloth.rotation += sloth.vx * 0.05;

            if (sloth.x - sloth.radius < 0) {
                sloth.x = sloth.radius;
                sloth.vx *= bounceFactor;
                playSound('bounce');
            } else if (sloth.x + sloth.radius > canvas.width) {
                sloth.x = canvas.width - sloth.radius;
                sloth.vx *= bounceFactor;
                playSound('bounce');
            }

            if (sloth.y - sloth.radius < 0) {
                sloth.y = sloth.radius;
                sloth.vy *= bounceFactor;
                playSound('bounce');
            }

            if (sloth.y + sloth.radius > groundY) {
                sloth.y = groundY - sloth.radius;
                sloth.vy *= bounceFactor;
                sloth.vx *= friction;
                
                if (Math.abs(sloth.vy) < 2.0 && Math.abs(sloth.vx) < 0.5) {
                    sloth.vx = 0;
                    sloth.vy = 0;
                    sloth.rotation = 0;
                    state = 'waiting';
                    
                    if (apples.every(a => a.collected)) {
                        launchBtn.textContent = 'LEVEL CLEAR!';
                        level++;
                        setTimeout(createLevel, 1500);
                    } else {
                        launchBtn.textContent = 'MISSED! RETRYING...';
                        setTimeout(() => {
                            if (state === 'waiting') {
                                apples.forEach(a => a.collected = false);
                                score = scoreAtLevelStart;
                                scoreEl.textContent = score;
                                
                                sloth.reset();
                                state = 'idle';
                                launchBtn.disabled = false;
                                launchBtn.textContent = 'LAUNCH SLOTH!';
                            }
                        }, 1500);
                    }
                } else if (Math.abs(sloth.vy) > 2.0) {
                    playSound('bounce');
                }
            }

            for (let a of apples) {
                if (!a.collected) {
                    const dist = Math.hypot(sloth.x - a.x, sloth.y - a.y);
                    if (dist < sloth.radius + a.radius) {
                        a.collected = true;
                        score += 10 * level; 
                        scoreEl.textContent = score;
                        playSound('apple');
                        
                        for(let i=0; i<8; i++) {
                            particles.push({
                                x: a.x, y: a.y,
                                vx: (Math.random() - 0.5) * 4,
                                vy: (Math.random() - 0.5) * 4,
                                life: 1.0, color: '#4CAF50'
                            });
                        }
                    }
                }
            }
        }

        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 0.04;
            if (p.life <= 0) {
                particles.splice(i, 1);
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#795548'; 
        ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
        ctx.fillStyle = '#4CAF50'; 
        ctx.fillRect(0, groundY, canvas.width, 8);

        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        for (let a of apples) {
            if (!a.collected) {
                ctx.font = `${a.radius * 2}px Arial`;
                ctx.fillText('🍎', a.x, a.y);
            }
        }

        if (state === 'idle') {
            const direction = parseInt(directionSlider.value);
            const power = parseInt(powerSlider.value);
            const bombX = sloth.x + (direction * 2.5);
            const bombY = sloth.y + 18;
            
            ctx.font = '22px Arial';
            let numBombs = Math.min(3, Math.ceil(power / 3.3)); 
            for(let i=0; i<numBombs; i++) {
                let offsetX = (i - (numBombs-1)/2) * 15;
                ctx.fillText('💣', bombX + offsetX, bombY);
            }
        }

        for (let p of particles) {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, 2 + p.life * 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1.0;
        }

        ctx.save();
        ctx.translate(sloth.x, sloth.y);
        ctx.rotate(sloth.rotation);
        ctx.font = '40px Arial';
        ctx.fillText('🦥', 0, 0);
        ctx.restore();
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    createLevel();
    loop();
</script>
</body>
</html>
